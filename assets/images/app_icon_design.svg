<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- 背景渐变 -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF8C42;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFD166;stop-opacity:1" />
    </linearGradient>

    <!-- 狮子毛发渐变 -->
    <linearGradient id="maneGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFB07C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF8C42;stop-opacity:1" />
    </linearGradient>

    <!-- 书本渐变 -->
    <linearGradient id="bookGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD166;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFB07C;stop-opacity:1" />
    </linearGradient>

    <!-- 阴影效果 -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#00000033"/>
    </filter>
  </defs>

  <!-- 圆角矩形背景 -->
  <rect x="16" y="16" width="480" height="480" rx="100" ry="100" fill="url(#bgGrad)"/>

  <!-- 装饰性圆形背景 -->
  <circle cx="256" cy="256" r="200" fill="#FFFFFF" opacity="0.15"/>

  <!-- 书本 -->
  <g transform="translate(256, 320)" filter="url(#shadow)">
    <!-- 书本主体 -->
    <path d="M-80,-40 C-80,-50 -70,-60 -50,-60 L50,-60 C70,-60 80,-50 80,-40 L80,40 C80,50 70,60 50,60 L-50,60 C-70,60 -80,50 -80,40 Z" fill="url(#bookGrad)" stroke="#E67635" stroke-width="3"/>

    <!-- 书页 -->
    <path d="M-60,-30 L60,-30" stroke="#FFFFFF" stroke-width="2" opacity="0.6"/>
    <path d="M-60,-10 L60,-10" stroke="#FFFFFF" stroke-width="2" opacity="0.6"/>
    <path d="M-60,10 L60,10" stroke="#FFFFFF" stroke-width="2" opacity="0.6"/>
    <path d="M-60,30 L60,30" stroke="#FFFFFF" stroke-width="2" opacity="0.6"/>

    <!-- 书脊 -->
    <path d="M0,-60 L0,60" stroke="#E67635" stroke-width="4"/>

    <!-- ABC文字 -->
    <text x="-40" y="5" font-family="Comic Sans MS, cursive" font-size="28" font-weight="bold" fill="#4A3728" text-anchor="middle">A</text>
    <text x="0" y="5" font-family="Comic Sans MS, cursive" font-size="28" font-weight="bold" fill="#FF6B6B" text-anchor="middle">B</text>
    <text x="40" y="5" font-family="Comic Sans MS, cursive" font-size="28" font-weight="bold" fill="#7BC96F" text-anchor="middle">C</text>
  </g>

  <!-- 狮子头部 -->
  <g transform="translate(256, 200)" filter="url(#shadow)">
    <!-- 毛发 -->
    <ellipse cx="0" cy="0" rx="95" ry="85" fill="url(#maneGrad)"/>

    <!-- 毛发装饰点 -->
    <circle cx="-70" cy="-50" r="15" fill="#FFD166" opacity="0.6"/>
    <circle cx="-85" cy="-10" r="12" fill="#FFD166" opacity="0.6"/>
    <circle cx="-75" cy="35" r="14" fill="#FFD166" opacity="0.6"/>
    <circle cx="70" cy="-50" r="15" fill="#FFD166" opacity="0.6"/>
    <circle cx="85" cy="-10" r="12" fill="#FFD166" opacity="0.6"/>
    <circle cx="75" cy="35" r="14" fill="#FFD166" opacity="0.6"/>
    <circle cx="-30" cy="-75" r="13" fill="#FFD166" opacity="0.6"/>
    <circle cx="30" cy="-75" r="13" fill="#FFD166" opacity="0.6"/>
    <circle cx="0" cy="-80" r="14" fill="#FFD166" opacity="0.6"/>

    <!-- 脸部 -->
    <ellipse cx="0" cy="5" rx="65" ry="60" fill="#FFFFFF"/>

    <!-- 耳朵 -->
    <circle cx="-55" cy="-45" r="22" fill="url(#maneGrad)"/>
    <circle cx="55" cy="-45" r="22" fill="url(#maneGrad)"/>
    <circle cx="-55" cy="-45" r="12" fill="#FFE299"/>
    <circle cx="55" cy="-45" r="12" fill="#FFE299"/>

    <!-- 眼睛 -->
    <g transform="translate(-25, -10)">
      <ellipse cx="0" cy="0" rx="14" ry="16" fill="#4A3728"/>
      <ellipse cx="3" cy="-4" rx="5" ry="6" fill="#FFFFFF"/>
      <circle cx="-2" cy="4" r="2" fill="#FFFFFF" opacity="0.5"/>
    </g>
    <g transform="translate(25, -10)">
      <ellipse cx="0" cy="0" rx="14" ry="16" fill="#4A3728"/>
      <ellipse cx="3" cy="-4" rx="5" ry="6" fill="#FFFFFF"/>
      <circle cx="-2" cy="4" r="2" fill="#FFFFFF" opacity="0.5"/>
    </g>

    <!-- 眉毛 -->
    <path d="M-40,-28 Q-25,-38 -10,-28" stroke="#4A3728" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M10,-28 Q25,-38 40,-28" stroke="#4A3728" stroke-width="4" fill="none" stroke-linecap="round"/>

    <!-- 鼻子 -->
    <ellipse cx="0" cy="18" rx="12" ry="10" fill="#FF8C42"/>

    <!-- 嘴巴 - 微笑 -->
    <path d="M-20,30 Q0,45 20,30" stroke="#4A3728" stroke-width="3" fill="none" stroke-linecap="round"/>

    <!-- 腮红 -->
    <ellipse cx="-40" cy="25" rx="14" ry="10" fill="#FFB5B5" opacity="0.5"/>
    <ellipse cx="40" cy="25" rx="14" ry="10" fill="#FFB5B5" opacity="0.5"/>
  </g>

  <!-- 装饰星星 -->
  <g transform="translate(100, 100)">
    <path d="M0,-15 L4,-4 L15,-4 L6,3 L9,15 L0,8 L-9,15 L-6,3 L-15,-4 L-4,-4 Z" fill="#FFD166" opacity="0.8"/>
  </g>
  <g transform="translate(400, 120)">
    <path d="M0,-12 L3,-3 L12,-3 L5,2 L7,12 L0,6 L-7,12 L-5,2 L-12,-3 L-3,-3 Z" fill="#FFFFFF" opacity="0.7"/>
  </g>
  <g transform="translate(120, 380)">
    <path d="M0,-10 L3,-3 L10,-3 L4,1 L6,10 L0,5 L-6,10 L-4,1 L-10,-3 L-3,-3 Z" fill="#FFD166" opacity="0.6"/>
  </g>

  <!-- 音符装饰 -->
  <g transform="translate(400, 350)" opacity="0.7">
    <circle cx="0" cy="0" r="8" fill="#FF6B6B"/>
    <rect x="6" y="-35" width="3" height="35" fill="#FF6B6B"/>
    <path d="M9,-35 Q20,-45 9,-50" fill="#FF6B6B"/>
  </g>

  <!-- 学习进度小勾 -->
  <g transform="translate(130, 150)">
    <circle cx="0" cy="0" r="18" fill="#7BC96F" opacity="0.8"/>
    <path d="M-8,0 L-3,6 L8,-6" stroke="white" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
